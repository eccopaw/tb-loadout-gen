<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Battles — Loadout Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --border-bright: #484f58;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --accent-dim: #1f3a5c;
    --green: #3fb950;
    --green-dim: #1a3a20;
    --red: #f85149;
    --red-dim: #3d1c1a;
    --gold: #d29922;
    --gold-dim: #3d2c0a;
    --pink: #f07ab0;
    --pink-dim: #3d1a2e;
    --orange: #f0883e;
    --orange-dim: #3d2010;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(88,166,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 100%, rgba(63,185,80,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1.1;
  }

  h1 span {
    color: var(--accent);
  }

  .tagline {
    margin-top: 0.5rem;
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .force-row {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    margin-bottom: 2rem;
  }

  .force-btn {
    padding: 8px 10px 8px 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-radius: 6px;
    border: 1px solid var(--border-bright);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    position: relative;
    white-space: nowrap;
    flex: 1;
    justify-content: center;
  }

  .force-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .force-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  #btn-stall.active, #btn-stall:active {
    background: var(--orange-dim);
    border-color: var(--orange);
    color: var(--orange);
  }

  #btn-cc.active, #btn-cc:active {
    background: var(--pink-dim);
    border-color: var(--pink);
    color: var(--pink);
  }

  #btn-dps.active, #btn-dps:active {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
  }

  #btn-preset.active, #btn-preset:active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
  }

  .force-btn-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .info-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0.5;
    font-size: 11px;
    cursor: default;
    flex-shrink: 0;
    position: relative;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
  }

  .info-icon:hover {
    opacity: 1;
  }

  .info-icon:hover .tooltip {
    display: block;
  }

  .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    padding: 8px 12px;
    width: 220px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    line-height: 1.6;
    text-transform: none;
    letter-spacing: 0;
    white-space: normal;
    z-index: 10;
    pointer-events: none;
  }

  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--border-bright);
  }



  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.75rem 0;
  }

  .slots {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 500px) {
    .slots { grid-template-columns: repeat(3, 1fr); }
  }

  .slot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 8px;
    text-align: center;
    height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: border-color 0.2s;
    overflow: hidden;
  }

  .slot.farm {
    border-color: var(--green);
    background: var(--green-dim);
  }

  .slot.forced-support {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .slot.forced-aoe {
    border-color: var(--orange);
    background: var(--orange-dim);
  }

  .slot.forced-cc {
    border-color: var(--pink);
    background: var(--pink-dim);
  }

  .slot.forced-dps {
    border-color: var(--red);
    background: var(--red-dim);
  }

  .slot-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .slot.farm .slot-tag { color: var(--gold); }
  .slot.forced .slot-tag { color: var(--accent); }

  .slot-name {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1.2;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
    display: block;
  }

  .generate-btn {
    width: 100%;
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 8px;
    border: 1px solid var(--green);
    background: var(--green-dim);
    color: var(--green);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2rem;
  }

  .generate-btn:hover {
    background: var(--green);
    color: #0d1117;
  }

  .generate-btn:active {
    transform: scale(0.98);
  }

  .ban-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .ban-btn {
    padding: 6px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .ban-btn:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }

  .ban-btn.banned {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
    text-decoration: line-through;
    opacity: 0.7;
  }

  .force-list-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .force-list-btn {
    padding: 6px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .force-list-btn:hover {
    border-color: var(--border-bright);
    color: var(--text);
  }

  .force-list-btn.forced {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>TB <span>Loadout Generator</span></h1>

  </header>

  <p class="section-label">Force settings</p>
  <div class="force-row">
    <button class="force-btn" id="btn-support" onclick="toggleForce('support', this)">
      Force Support
      <span class="info-icon" onclick="event.stopPropagation()">ⓘ<span class="tooltip">Commander, DJ</span></span>
    </button>
    <button class="force-btn" id="btn-stall" onclick="toggleForce('stall', this)">
      Force Stall
      <span class="info-icon" onclick="event.stopPropagation()">ⓘ<span class="tooltip">Flamethrower, Hallowboomer, Cryo-Gunner, Sleeter, Harpoon Hunter, Snowballer, Stunner, Scarecrow</span></span>
    </button>
    <button class="force-btn" id="btn-cc" onclick="toggleForce('cc', this)">
      Force CC
      <span class="info-icon" onclick="event.stopPropagation()">ⓘ<span class="tooltip">Aviator, Plasma Trooper, Mortar, Shotgunner, Fragger, Tuber, Flamethrower, Hallowboomer, Elf, Patrioteer, Enforcer</span></span>
    </button>
    <button class="force-btn" id="btn-dps" onclick="toggleForce('dps', this)">
      Force Single DPS
      <span class="info-icon" onclick="event.stopPropagation()">ⓘ<span class="tooltip">Sniper, Marksman, Tweeter, Mercenary, Barracks, Commando, Enforcer, Soldier, Golden Commando, Golden Scout, Huntsman, Harpoon Hunter, Red Sniper</span></span>
    </button>
  </div>

  <div class="force-row" style="margin-top: -1.25rem;">
    <button class="force-btn" id="btn-preset" onclick="togglePreset(this)">
      Balancing Battles Restriction
      <span class="info-icon" onclick="event.stopPropagation()">ⓘ<span class="tooltip">Allows only: Aviator, Flamethrower, Enforcer, Fragger, Mercenary, Phaser, Soldier, Tuber, Golden Commando, Zed</span></span>
    </button>
  </div>

  <hr class="divider">

  <div class="slots" id="slots">
    <div class="slot" id="slot0">
      <span class="slot-name" id="s0">—</span>
    </div>
    <div class="slot" id="slot1">
      <span class="slot-name" id="s1">—</span>
    </div>
    <div class="slot" id="slot2">
      <span class="slot-name" id="s2">—</span>
    </div>
    <div class="slot" id="slot3">
      <span class="slot-name" id="s3">—</span>
    </div>
    <div class="slot" id="slot4">
      <span class="slot-name" id="s4">—</span>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()">⟳ Generate Loadout</button>

  <hr class="divider">

  <p class="section-label">Ban list — click to ban</p>
  <div class="ban-grid" id="ban-grid"></div>

  <hr class="divider">

  <p class="section-label">Force list — click to force</p>
  <div class="force-list-grid" id="force-list-grid"></div>



</div>
<script>
  const ALL_TOWERS = [
    'DJ', 'Commander', 'Aviator', 'Phaser', 'Marksman', 'Anarchist',
    'Tweeter', 'Plasma Trooper', 'Mercenary', 'Mortar', 'Barracks', 'Patrol',
    'Commando', 'Cryo-Gunner', 'Railgunner', 'Enforcer', 'Shotgunner', 'Soldier',
    'Fragger', 'Flamethrower', 'Golden Scout', 'Golden Commando', 'Hallowboomer', 'Tuber',
    'Zed', 'Graveyard'
  ];

  const DEFAULT_BANNED = new Set([
    'Huntsman', 'Elf', 'Sleeter', 'Harpoon Hunter', 'Snowballer',
    'Ice Cream', 'Stunner', 'Patrioteer', 'Scarecrow', 'Sniper', 'Red Sniper'
  ]);

  const ALL_TOWERS_FULL = [
    'Farm',
    ...ALL_TOWERS,
    'Huntsman', 'Elf', 'Sleeter', 'Harpoon Hunter', 'Snowballer',
    'Ice Cream', 'Stunner', 'Patrioteer', 'Scarecrow', 'Sniper', 'Red Sniper'
  ];

  const POOL = [...ALL_TOWERS_FULL];
  const SUPPORT = ['Commander', 'DJ'];
  const STALL = ['Flamethrower', 'Hallowboomer', 'Cryo-Gunner', 'Sleeter', 'Harpoon Hunter', 'Snowballer', 'Stunner', 'Scarecrow'];
  const CC = ['Aviator', 'Plasma Trooper', 'Mortar', 'Shotgunner', 'Fragger', 'Tuber', 'Flamethrower', 'Hallowboomer', 'Elf', 'Patrioteer'];
  const DPS = ['Sniper', 'Marksman', 'Tweeter', 'Mercenary', 'Commando', 'Enforcer', 'Soldier', 'Golden Commando', 'Golden Scout', 'Huntsman', 'Harpoon Hunter', 'Red Sniper'];

  const forced = { support: false, stall: false, cc: false, dps: false };
  const banned = new Set(DEFAULT_BANNED);
  const forceList = new Set(['Farm']);

  const PRESET_ALLOWED = new Set(['Aviator', 'Flamethrower', 'Enforcer', 'Fragger', 'Mercenary', 'Phaser', 'Soldier', 'Tuber', 'Golden Commando', 'Zed']);
  let presetActive = false;

  function togglePreset(btn) {
    presetActive = !presetActive;
    btn.classList.toggle('active', presetActive);

    const banBtns = document.querySelectorAll('.ban-btn');
    banBtns.forEach(b => {
      const tower = b.textContent.trim();
      if (presetActive) {
        if (!PRESET_ALLOWED.has(tower)) {
          banned.add(tower);
          b.classList.add('banned');
        } else {
          banned.delete(tower);
          b.classList.remove('banned');
        }
      } else {
        // Restore to default banned state
        if (DEFAULT_BANNED.has(tower)) {
          banned.add(tower);
          b.classList.add('banned');
        } else {
          banned.delete(tower);
          b.classList.remove('banned');
        }
      }
    });
  }

  function toggleForce(group, btn) {
    forced[group] = !forced[group];
    btn.classList.toggle('active', forced[group]);
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickFrom(pool) {
    const available = pool.filter(t => !banned.has(t));
    return available.length ? shuffle(available)[0] : null;
  }

  function fitSlotText(el) {
    const words = el.textContent.trim().split(' ');
    if (words.length >= 2) {
      el.style.fontSize = '14px';
      el.style.whiteSpace = 'normal';
      el.style.wordBreak = 'break-word';
    } else {
      el.style.whiteSpace = 'nowrap';
      el.style.wordBreak = 'normal';
      let size = 14;
      el.style.fontSize = size + 'px';
      while (el.scrollWidth > el.offsetWidth && size > 7) {
        size -= 0.5;
        el.style.fontSize = size + 'px';
      }
    }
  }

  function generate() {
    const forcedListPicks = new Set();
    let forcedSupport = null, forcedStall = null, forcedCC = null, forcedDPS = null;
    const forcedNonFarm = [];

    if (forced.support) {
      const pick = pickFrom(SUPPORT);
      if (pick) { forcedNonFarm.push(pick); forcedSupport = pick; }
    }
    if (forced.stall) {
      const pick = pickFrom(STALL.filter(t => !forcedNonFarm.includes(t)));
      if (pick) { forcedNonFarm.push(pick); forcedStall = pick; }
    }
    if (forced.cc) {
      const pick = pickFrom(CC.filter(t => !forcedNonFarm.includes(t)));
      if (pick) { forcedNonFarm.push(pick); forcedCC = pick; }
    }
    if (forced.dps) {
      const pick = pickFrom(DPS.filter(t => !forcedNonFarm.includes(t)));
      if (pick) { forcedNonFarm.push(pick); forcedDPS = pick; }
    }

    // Other force list picks (excluding Farm)
    for (const t of forceList) {
      if (t === 'Farm') continue;
      if (!forcedNonFarm.includes(t) && forcedNonFarm.length < 4) {
        forcedNonFarm.push(t);
        forcedListPicks.add(t);
      }
    }

    const farmForced = forceList.has('Farm');
    const allForced = farmForced ? [...forcedNonFarm, 'Farm'] : [...forcedNonFarm];
    const remaining = POOL.filter(t => !banned.has(t) && !allForced.includes(t));
    const needed = 5 - allForced.length;
    const randoms = shuffle(remaining).slice(0, needed);

    const names = farmForced
      ? ['Farm', ...forcedNonFarm, ...randoms]
      : [...forcedNonFarm, ...randoms];

    for (let i = 0; i < 5; i++) {
      const el = document.getElementById('s' + i);
      const slot = document.getElementById('slot' + i);
      el.textContent = names[i] || '—';
      fitSlotText(el);
      slot.className = 'slot';
      if (names[i] === 'Farm') slot.classList.add('farm');
      else if (forcedSupport === names[i]) slot.classList.add('forced-support');
      else if (forcedStall === names[i]) slot.classList.add('forced-aoe');
      else if (forcedCC === names[i]) slot.classList.add('forced-cc');
      else if (forcedDPS === names[i]) slot.classList.add('forced-dps');
      else if (forcedListPicks.has(names[i])) slot.classList.add('forced-support');
    }
  }

  function buildBanGrid() {
    const grid = document.getElementById('ban-grid');
    ALL_TOWERS_FULL.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'ban-btn';
      btn.textContent = t;
      if (DEFAULT_BANNED.has(t)) btn.classList.add('banned');
      btn.onclick = () => {
        if (banned.has(t)) banned.delete(t);
        else banned.add(t);
        btn.classList.toggle('banned');
      };
      grid.appendChild(btn);
    });
  }

  function buildForceListGrid() {
    const grid = document.getElementById('force-list-grid');
    ALL_TOWERS_FULL.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'force-list-btn';
      btn.textContent = t;
      if (forceList.has(t)) btn.classList.add('forced');
      btn.onclick = () => {
        if (forceList.has(t)) forceList.delete(t);
        else forceList.add(t);
        btn.classList.toggle('forced');
      };
      grid.appendChild(btn);
    });
  }

  buildBanGrid();
  buildForceListGrid();
</script>
</body>
</html>
